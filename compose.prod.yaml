---
# Production environment override
services:
  php:
    build:
      context: .
      target: frankenphp_prod
    volumes:
      - ./config/jwt:/app/config/jwt:rw,cached
    environment:
      APP_SECRET: ${APP_SECRET}
      MERCURE_PUBLISHER_JWT_KEY: ${CADDY_MERCURE_JWT_SECRET}
      MERCURE_SUBSCRIBER_JWT_KEY: ${CADDY_MERCURE_JWT_SECRET}

    logging:
      driver: fluentd
      options:
        fluentd-address: "localhost:24224"
        fluentd-async: "true"
        fluentd-retry-wait: "1s"
        fluentd-max-retries: "30"
        tag: "docker.{{.Name}}"

  database:
    command:
      - --transaction-isolation=READ-COMMITTED
      - --innodb_rollback_on_timeout=ON
    logging:
      driver: fluentd
      options:
        fluentd-address: "localhost:24224"
        fluentd-async: "true"
        tag: "docker.{{.Name}}"

  rabbitmq:
    logging:
      driver: fluentd
      options:
        fluentd-address: "localhost:24224"
        fluentd-async: "true"
        tag: "docker.{{.Name}}"

  redis:
    logging:
      driver: fluentd
      options:
        fluentd-address: "localhost:24224"
        fluentd-async: "true"
        tag: "docker.{{.Name}}"

  fluent-bit:
    image: fluent/fluent-bit:4.0
    container_name: zigzag_fluent_bit
    volumes:
      - ./fluent-bit:/fluent-bit/etc:ro
    ports:
      - "127.0.0.1:24224:24224"
      - "127.0.0.1:2020:2020"
    environment:
      NEW_RELIC_LICENSE_KEY: ${NEW_RELIC_LICENSE_KEY}
      APP_ENV: prod
    restart: unless-stopped

  # Messenger worker services — production overrides
  #
  # Workers use the same prod image target as the php service.
  # Logging mirrors the php service configuration: fluentd-async ensures
  # worker logs are buffered and not lost if fluent-bit restarts briefly.
  # fluentd-retry-wait and fluentd-max-retries are included because workers
  # are long-running processes that need the same delivery guarantees as php.

  messenger_worker:
    build:
      context: .
      target: frankenphp_prod
    environment:
      APP_SECRET: ${APP_SECRET}
      APP_ENV: prod
    logging:
      driver: fluentd
      options:
        fluentd-address: "localhost:24224"
        fluentd-async: "true"
        fluentd-retry-wait: "1s"
        fluentd-max-retries: "30"
        tag: "docker.{{.Name}}"

  messenger_worker_webhooks:
    build:
      context: .
      target: frankenphp_prod
    environment:
      APP_SECRET: ${APP_SECRET}
      APP_ENV: prod
    logging:
      driver: fluentd
      options:
        fluentd-address: "localhost:24224"
        fluentd-async: "true"
        fluentd-retry-wait: "1s"
        fluentd-max-retries: "30"
        tag: "docker.{{.Name}}"

  messenger_worker_tracking:
    build:
      context: .
      target: frankenphp_prod
    environment:
      APP_SECRET: ${APP_SECRET}
      APP_ENV: prod
    logging:
      driver: fluentd
      options:
        fluentd-address: "localhost:24224"
        fluentd-async: "true"
        fluentd-retry-wait: "1s"
        fluentd-max-retries: "30"
        tag: "docker.{{.Name}}"

