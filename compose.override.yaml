---
# Development environment override
services:
  php:
    restart: "no"
    build:
      context: .
      target: frankenphp_dev
    volumes:
      - ./:/app
      - ./frankenphp/Caddyfile:/etc/frankenphp/Caddyfile:ro
      - ./frankenphp/conf.d/20-app.dev.ini:/usr/local/etc/php/app.conf.d/20-app.dev.ini:ro
      # If you develop on Mac or Windows you can remove the vendor/ directory
      #  from the bind-mount for better performance by enabling the next line:
      #- /app/vendor
    environment:
      FRANKENPHP_WORKER_CONFIG: watch
      MERCURE_EXTRA_DIRECTIVES: demo
      # See https://xdebug.org/docs/all_settings#mode
      XDEBUG_MODE: "${XDEBUG_MODE:-off}"
      APP_ENV: "${APP_ENV:-dev}"
    extra_hosts:
      # Ensure that host.docker.internal is correctly defined on Linux
      - host.docker.internal:host-gateway
    tty: true
###> symfony/mercure-bundle ###
###< symfony/mercure-bundle ###

###> doctrine/doctrine-bundle ###
  database:
    restart: "no"
    ports:
      - "3306:3306"
###< doctrine/doctrine-bundle ###

###> symfony/mailer ###
  mailer:
    restart: "no"
    image: axllent/mailpit
    ports:
      - "1025"
      - "8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
###< symfony/mailer ###

  rabbitmq:
    restart: "no"
    ports:
      - "5672:5672"
      - "15672:15672"
  redis:
    restart: "no"
    ports:
      - "6379:6379"

  # Messenger worker services — development overrides
  #
  # Source is bind-mounted so code changes are reflected immediately
  # without rebuilding the image, consistent with the php service behaviour.

  messenger_worker:
    restart: "no"
    build:
      context: .
      target: frankenphp_dev
    volumes:
      - ./:/app
    environment:
      APP_ENV: "${APP_ENV:-dev}"

  messenger_worker_webhooks:
    restart: "no"
    build:
      context: .
      target: frankenphp_dev
    volumes:
      - ./:/app
    environment:
      APP_ENV: "${APP_ENV:-dev}"

  messenger_worker_tracking:
    restart: "no"
    build:
      context: .
      target: frankenphp_dev
    volumes:
      - ./:/app
    environment:
      APP_ENV: "${APP_ENV:-dev}"

