---
services:
  php:
    image: ${IMAGES_PREFIX:-}app-php
    container_name: zigzag_php
    restart: unless-stopped
    environment:
      SERVER_NAME: ${SERVER_NAME:-localhost}, php:80
      DEFAULT_URI: https://${SERVER_NAME:-localhost}:${HTTPS_PORT:-443}
      MERCURE_PUBLISHER_JWT_KEY: ${CADDY_MERCURE_JWT_SECRET:-!ChangeThisMercureHubJWTSecretKey!}
      MERCURE_SUBSCRIBER_JWT_KEY: ${CADDY_MERCURE_JWT_SECRET:-!ChangeThisMercureHubJWTSecretKey!}
      # Run "composer require symfony/orm-pack" to install and configure Doctrine ORM
      DATABASE_URL: mysql://${MYSQL_USER:-user}:${MYSQL_PASSWORD:-passwd}@database:3306/${MYSQL_DATABASE:-db}?serverVersion=${MYSQL_VERSION:-8}&charset=${MYSQL_CHARSET:-utf8mb4}
      # Run "composer require symfony/mercure-bundle" to install and configure the Mercure integration
      MERCURE_URL: ${CADDY_MERCURE_URL:-http://php/.well-known/mercure}
      MERCURE_PUBLIC_URL: ${CADDY_MERCURE_PUBLIC_URL:-https://${SERVER_NAME:-localhost}:${HTTPS_PORT:-443}/.well-known/mercure}
      MERCURE_JWT_SECRET: ${CADDY_MERCURE_JWT_SECRET:-!ChangeThisMercureHubJWTSecretKey!}
      # The two next lines can be removed after initial installation
      SYMFONY_VERSION: ${SYMFONY_VERSION:-}
      STABILITY: ${STABILITY:-stable}
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - target: 80
        published: ${HTTP_PORT:-80}
        host_ip: "0.0.0.0"
        protocol: tcp
      - target: 443
        published: ${HTTPS_PORT:-443}
        host_ip: "0.0.0.0"
        protocol: tcp
      - target: 443
        published: ${HTTPS_PORT:-443}
        host_ip: "0.0.0.0"
        protocol: udp
    depends_on:
      database:
        condition: service_healthy

  database:
    image: mysql:${MYSQL_VERSION:-8.4}
    container_name: zigzag_database
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-db}
      MYSQL_USER: ${MYSQL_USER:-user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-passwd}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-passwd}
    healthcheck:
      # Use a real SQL query rather than mysqladmin ping. mysqladmin ping
      # returns 0 as soon as the server process responds to admin requests,
      # but before it accepts SQL connections. This race causes dbal:run-sql
      # to get "Connection refused" (exit 255) and the entrypoint gives up
      # immediately instead of retrying.
      test: ["CMD-SHELL", "mysql -uroot -p$$MYSQL_ROOT_PASSWORD -e 'SELECT 1' 2>/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s
    volumes:
      - database_data:/var/lib/mysql:rw

  rabbitmq:
    image: rabbitmq:4.2-management-alpine
    container_name: zigzag_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - rabbitmq_logs:/var/log/rabbitmq

  redis:
    image: redis:8.4-alpine
    container_name: zigzag_redis
    volumes:
      - redis_data:/data

  # Messenger worker services
  #
  # Each worker consumes a single transport — phpamqplib uses a blocking consumer
  # that prevents consuming multiple transports in one process safely.
  # See: https://github.com/jwage/phpamqplib-messenger

  messenger_worker:
    # Consumes: async (emails, SMS, chat, billing, anomalies) + scheduler_default.
    # WARNING: keep this service at exactly 1 replica. Running multiple instances
    # will cause the Symfony Scheduler to dispatch duplicate subscription billing jobs.
    profiles: [workers]
    image: ${IMAGES_PREFIX:-}app-php
    container_name: zigzag_messenger_worker
    restart: unless-stopped
    command: [ "php", "bin/console", "messenger:consume", "async", "scheduler_default", "--time-limit=3600", "--memory-limit=128M", "-vv" ]
    healthcheck:
      disable: true
    environment:
      DATABASE_URL: mysql://${MYSQL_USER:-user}:${MYSQL_PASSWORD:-passwd}@database:3306/${MYSQL_DATABASE:-db}?serverVersion=${MYSQL_VERSION:-8}&charset=${MYSQL_CHARSET:-utf8mb4}
      RABBITMQ_DSN: ${RABBITMQ_DSN:-phpamqplib://guest:guest@rabbitmq:5672/%2f}
    depends_on:
      database:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started

  messenger_worker_webhooks:
    # Consumes: async_webhooks (payment webhook processing).
    # Isolated from the general async pipeline to prevent webhook retry storms
    # from starving billing and notification processing.
    profiles: [workers]
    image: ${IMAGES_PREFIX:-}app-php
    container_name: zigzag_messenger_worker_webhooks
    restart: unless-stopped
    command: [ "php", "bin/console", "messenger:consume", "async_webhooks", "--time-limit=3600", "--memory-limit=64M", "-vv" ]
    healthcheck:
      disable: true
    environment:
      DATABASE_URL: mysql://${MYSQL_USER:-user}:${MYSQL_PASSWORD:-passwd}@database:3306/${MYSQL_DATABASE:-db}?serverVersion=${MYSQL_VERSION:-8}&charset=${MYSQL_CHARSET:-utf8mb4}
      RABBITMQ_DSN: ${RABBITMQ_DSN:-phpamqplib://guest:guest@rabbitmq:5672/%2f}
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started

  messenger_worker_tracking:
    # Consumes: async_tracking (real-time GPS location events).
    # High-throughput transport is kept isolated so tracking spikes do not affect
    # webhook or billing processing.
    profiles: [workers]
    image: ${IMAGES_PREFIX:-}app-php
    container_name: zigzag_messenger_worker_tracking
    restart: unless-stopped
    command: [ "php", "bin/console", "messenger:consume", "async_tracking", "--time-limit=3600", "--memory-limit=64M", "-vv" ]
    healthcheck:
      disable: true
    environment:
      DATABASE_URL: mysql://${MYSQL_USER:-user}:${MYSQL_PASSWORD:-passwd}@database:3306/${MYSQL_DATABASE:-db}?serverVersion=${MYSQL_VERSION:-8}&charset=${MYSQL_CHARSET:-utf8mb4}
      RABBITMQ_DSN: ${RABBITMQ_DSN:-phpamqplib://guest:guest@rabbitmq:5672/%2f}
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started

# Mercure is installed as a Caddy module, prevent the Flex recipe from installing another service
###> symfony/mercure-bundle ###
###< symfony/mercure-bundle ###

volumes:
  caddy_data:
  caddy_config:
  rabbitmq_data:
  rabbitmq_logs:
  redis_data:

###> doctrine/doctrine-bundle ###
  database_data:
###< doctrine/doctrine-bundle ###
